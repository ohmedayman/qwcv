<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting... - QCV</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L59BQSvq/qcv-app-icon-final.png">
    <style>
        body{margin:0;padding:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f6f9;font-family:'Inter',sans-serif}
        .loader{text-align:center}
        .spinner{width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#0003c9;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
        @keyframes spin{to{transform:rotate(360deg)}}
        p{color:#6b7280;font-size:0.9rem}
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <p>جاري التحويل...</p>
    </div>
    <script>
        (function(){
            var params = new URLSearchParams(window.location.search);
            var uid = params.get('u');
            if(uid){
                window.location.replace('login.html?ref=' + encodeURIComponent(uid));
            } else {
                window.location.replace('index.html');
            }
        })();
    </script>
</body>
</html>
